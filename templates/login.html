<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Taller CIF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <script>(function(){var t=localStorage.getItem('cif-theme');if(t==='dark')document.documentElement.classList.add('dark');})();</script>
    <style>
        body { background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        html.dark body { background: linear-gradient(135deg, #080d18 0%, #0d1626 100%); }
        .login-card { border-radius: 1rem; max-width: 420px; width: 100%; }
        #login-theme-toggle { position: fixed; top: 1rem; right: 1rem; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 8px; padding: 0.4rem 0.65rem; cursor: pointer; font-size: 1rem; transition: background 0.2s ease; z-index: 999; }
        #login-theme-toggle:hover { background: rgba(255,255,255,0.28); }
    </style>
</head>
<body>
    <!-- Toggle de tema en pantalla login -->
    <button id="login-theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Cambiar tema">
        <i class="bi bi-moon-fill"></i>
    </button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-5">
                <div class="card shadow-lg login-card border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-truck fs-1 text-primary"></i>
                            <h3 class="fw-bold mt-2">Taller CIF</h3>
                            <p class="text-muted small">Sistema de Control de Mantenimiento</p>
                        </div>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category if category != 'message' else 'warning' }} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST" action="/login">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="Ingresa tu usuario" required autofocus>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 fs-5">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <script>
        // Sincronizar ícono del botón de login con el tema
        (function(){
            var btn = document.getElementById('login-theme-toggle');
            if(btn && document.documentElement.classList.contains('dark')){
                btn.innerHTML = '<i class="bi bi-sun-fill"></i>';
            }
            if(btn) btn.addEventListener('click', function(){
                var isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('cif-theme', isDark ? 'dark' : 'light');
                btn.innerHTML = isDark ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
            });
        })();
    </script>
</body>
</html>
